<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registros de Ventas - Kiosco El Cholo</title>
    <!-- Google Fonts: Outfit for titles, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #131a26;
            --bg-tertiary: #1b2537;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-primary: #6366f1; /* Indigo */
            --accent-hover: #4f46e5;
            --success: #10b981; /* Emerald */
            --warning: #f59e0b; /* Amber */
            --danger: #ef4444; /* Rose */
            --danger-hover: #dc2626;
            --border-color: #2e3c51;
            --card-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        h2, h3 {
            font-family: 'Outfit', sans-serif;
            margin: 0;
            font-weight: 700;
        }

        h3 {
            color: var(--warning);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            margin-top: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Botones navegación */
        .navigation-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .btn-nav {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .btn-nav:hover {
            background: var(--bg-tertiary);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        /* Secciones principales en tarjetas */
        .panel-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--card-shadow);
        }

        /* Controles de filtro */
        .filter-row {
            display: flex;
            gap: 14px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 150px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: var(--transition);
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        /* Tablas responsivas */
        .contenedor-tabla {
            width: 100%;
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-secondary);
            font-size: 0.95rem;
            text-align: left;
        }

        th {
            background: var(--bg-tertiary);
            color: var(--warning);
            padding: 14px 16px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255,255,255,0.015);
        }

        /* Detalles de productos vendidos */
        .prod-det-list {
            margin: 4px 0 0 0;
            padding-left: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Botón de eliminar venta */
        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        .metodo-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .metodo-efectivo {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .metodo-debito {
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-primary);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .metodo-qr {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        /* Resumen de totales */
        .resumen-totales {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 10px;
        }

        .total-card {
            background: var(--bg-tertiary);
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid var(--accent-primary);
        }

        .total-card h4 {
            margin: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .total-card span {
            display: block;
            margin-top: 6px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="navigation-row">
        <button class="btn-nav" onclick="window.location.href='admin.html'">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m12 19-7-7 7-7"/>
                <path d="M19 12H5"/>
            </svg>
            VOLVER AL PANEL DE CAJA
        </button>
        <button class="btn-nav" onclick="window.location.href='index.html'">
            🏪 IR AL MOSTRADOR
        </button>
    </div>

    <!-- RESUMEN DE VENTAS FILTRADAS -->
    <div class="panel-card">
        <h3 style="margin-top: 0; display: flex; align-items: center; gap: 8px;">
            📊 RESUMEN DE REGISTROS DE HOY
        </h3>
        <div class="resumen-totales">
            <div class="total-card" style="border-left-color: var(--success);">
                <h4>Total Ventas</h4>
                <span id="resumen-total-ventas">$0,00</span>
            </div>
            <div class="total-card" style="border-left-color: var(--danger);">
                <h4>Total Salidas/Gastos</h4>
                <span id="resumen-total-gastos">$0,00</span>
            </div>
            <div class="total-card" style="border-left-color: var(--warning);">
                <h4>Transacciones</h4>
                <span id="resumen-cant-ventas">0</span>
            </div>
        </div>
    </div>

    <!-- LISTA DE VENTAS -->
    <div class="panel-card">
        <h3 style="margin-top: 0; display: flex; align-items: center; gap: 8px;">
            📋 HISTORIAL DE VENTAS Y MOVIMIENTOS DEL DÍA
        </h3>

        <!-- FILTROS -->
        <div class="filter-row">
            <div class="filter-group">
                <label>Medio de Pago</label>
                <select id="filtro-metodo" onchange="filtrarVentas()">
                    <option value="todos">Todos los métodos</option>
                    <option value="efectivo">💵 Efectivo</option>
                    <option value="debito">💳 Tarjeta</option>
                    <option value="qr">📱 QR / Mercado Pago</option>
                    <option value="gastos">💸 Egresos / Gastos</option>
                </select>
            </div>
            <div class="filter-group" style="flex: 2;">
                <label>Buscar por detalle o producto</label>
                <input type="text" id="filtro-texto" placeholder="Buscar por cliente, proveedor, nombre de producto..." oninput="filtrarVentas()">
            </div>
        </div>

        <div class="contenedor-tabla">
            <table id="tabla-ventas">
                <thead>
                    <tr>
                        <th style="width: 140px;">Hora</th>
                        <th>Concepto / Productos</th>
                        <th style="width: 160px;">Medio de Pago</th>
                        <th style="width: 120px;">Monto</th>
                        <th style="width: 110px; text-align: center;">Acción</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-secondary); font-style: italic;">Cargando registros...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="ventas.js"></script>
</body>
</html>
